# Railway-Build-Konfiguration für pnpm-Workspace-Monorepo.
#
# Phase-0-Setup: rootDirectory steht noch auf '/' (Dashboard noch nicht umgestellt).
# Root-package.json hat 'build'/'start'-Shim die an --filter @herzblatt/frontend delegieren.
#
# Wird nach Task 14 (rootDirectory=apps/frontend) wieder einfacher.

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm-10_x"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @herzblatt/frontend build"]

[start]
cmd = "pnpm --filter @herzblatt/frontend start"

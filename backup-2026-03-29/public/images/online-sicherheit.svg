<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg20" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001F3F"/>
      <stop offset="100%" style="stop-color:#0074D9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg20)"/>
  <circle cx="220" cy="100" r="140" fill="white" opacity="0.08"/>
  <circle cx="980" cy="400" r="195" fill="white" opacity="0.06"/>
  <circle cx="600" cy="250" r="80" fill="white" opacity="0.1"/>
  
  <!-- Lock body -->
  <rect x="540" y="240" width="120" height="130" rx="12" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Lock shackle -->
  <path d="M 570 240 Q 570 150 600 150 Q 630 150 630 240" fill="none" stroke="white" stroke-width="5"/>
  
  <!-- Lock keyhole circle -->
  <circle cx="600" cy="285" r="12" fill="none" stroke="white" stroke-width="3"/>
  
  <!-- Heart inside lock -->
  <path d="M 600 310 Q 590 300 580 310 Q 575 320 580 330 Q 590 340 600 348 Q 610 340 620 330 Q 625 320 620 310 Q 610 300 600 310 Z" fill="#FF1493" opacity="0.8"/>
  
  <!-- Lock shine/reflection -->
  <line x1="555" y1="250" x2="555" y2="300" stroke="white" stroke-width="2" opacity="0.3"/>
  
  <!-- Security checkmarks -->
  <g opacity="0.6">
    <path d="M 720 200 L 730 210 L 745 195" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <circle cx="730" cy="205" r="25" fill="none" stroke="white" stroke-width="2"/>
  </g>
  
  <g opacity="0.6">
    <path d="M 720 320 L 730 330 L 745 315" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <circle cx="730" cy="325" r="25" fill="none" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Shield accent -->
  <path d="M 480 200 Q 470 180 480 160 Q 495 150 510 160 Q 520 180 510 200 Z" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  
  <!-- Decorative shapes -->
  <rect x="300" y="150" width="65" height="65" rx="12" fill="white" opacity="0.1"/>
  <circle cx="900" cy="300" r="50" fill="white" opacity="0.12"/>
  
  <!-- Pattern dots -->
  <circle cx="100" cy="450" r="3" fill="white" opacity="0.2"/>
  <circle cx="300" cy="50" r="2" fill="white" opacity="0.15"/>
  <circle cx="900" cy="100" r="4" fill="white" opacity="0.15"/>
  <circle cx="1100" cy="350" r="3" fill="white" opacity="0.2"/>
</svg>

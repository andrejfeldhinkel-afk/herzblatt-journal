<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7F7F"/>
      <stop offset="100%" stop-color="#FF69B4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="180" cy="120" r="100" fill="rgba(255, 255, 255, 0.11)"/>
  <circle cx="1020" cy="380" r="130" fill="rgba(255, 255, 255, 0.09)"/>

  <!-- Main icon: Brain and heart connected with line -->
  <g transform="translate(600, 250)">
    <!-- Brain (left side) -->
    <g transform="translate(-80, 0)">
      <ellipse cx="0" cy="0" rx="40" ry="50" fill="white"/>
      <!-- Brain lobes -->
      <circle cx="-20" cy="-25" r="15" fill="white"/>
      <circle cx="20" cy="-25" r="15" fill="white"/>
      <circle cx="-15" cy="0" r="12" fill="white"/>
      <circle cx="15" cy="0" r="12" fill="white"/>
      <circle cx="-20" cy="25" r="13" fill="white"/>
      <circle cx="20" cy="25" r="13" fill="white"/>
      <!-- Brain stem -->
      <rect x="-8" y="45" width="16" height="30" fill="white" rx="8"/>
    </g>

    <!-- Heart (right side) -->
    <g transform="translate(80, 0)">
      <path d="M 0,-25 C -18,-42 -45,-42 -45,-20 C -45,5 0,40 0,40 C 0,40 45,5 45,-20 C 45,-42 18,-42 0,-25 Z" fill="white"/>
    </g>

    <!-- Connecting line with circles -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-40" cy="0" r="6" fill="white"/>
    <circle cx="40" cy="0" r="6" fill="white"/>
  </g>
</svg>
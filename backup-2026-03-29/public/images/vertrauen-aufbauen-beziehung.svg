<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB6C1"/>
      <stop offset="100%" stop-color="#FF69B4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Decorative circles for depth -->
  <circle cx="200" cy="100" r="80" fill="rgba(255, 255, 255, 0.1)"/>
  <circle cx="1000" cy="400" r="120" fill="rgba(255, 255, 255, 0.08)"/>

  <!-- Main icon: Two interlocking hands with heart shield -->
  <g transform="translate(600, 250)">
    <!-- Left hand -->
    <g transform="translate(-80, -20)">
      <ellipse cx="0" cy="0" rx="35" ry="50" fill="white"/>
      <circle cx="0" cy="-55" r="18" fill="white"/>
      <rect x="-25" y="-35" width="12" height="40" fill="white" rx="6"/>
      <rect x="-8" y="-35" width="12" height="40" fill="white" rx="6"/>
      <rect x="8" y="-35" width="12" height="40" fill="white" rx="6"/>
    </g>

    <!-- Right hand -->
    <g transform="translate(80, -20) scale(-1, 1)">
      <ellipse cx="0" cy="0" rx="35" ry="50" fill="white"/>
      <circle cx="0" cy="-55" r="18" fill="white"/>
      <rect x="-25" y="-35" width="12" height="40" fill="white" rx="6"/>
      <rect x="-8" y="-35" width="12" height="40" fill="white" rx="6"/>
      <rect x="8" y="-35" width="12" height="40" fill="white" rx="6"/>
    </g>

    <!-- Heart in center -->
    <path d="M 0,-25 C -15,-40 -40,-40 -40,-20 C -40,0 0,35 0,35 C 0,35 40,0 40,-20 C 40,-40 15,-40 0,-25 Z" fill="rgba(255, 255, 255, 0.9)"/>
  </g>
</svg>
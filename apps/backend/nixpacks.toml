# Railway/Nixpacks Config für Backend-Service.
#
# Wir sind Teil eines pnpm-Workspaces mit der einzigen pnpm-lock.yaml im Repo-Root.
# Railway's rootDirectory ist "apps/backend" → er sieht den Root-Lock nicht.
#
# Lösung: nutze `npm install` (nicht `npm ci`), das generiert eine Lockfile
# on-the-fly aus package.json. Funktioniert, weil unsere App-Deps unabhängig sind
# (keine @herzblatt/*-Workspace-Links).
#
# WICHTIG: Hält die richtige Node-Version (22) und überschreibt Railway's
# automatisch gewählte Commands.

providers = ["node"]

[variables]
NPM_CONFIG_PRODUCTION = "false"
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install --no-audit --no-fund --legacy-peer-deps",
]

[phases.build]
cmds = [
  "npm run build",
]

[start]
cmd = "node dist/index.js"

# Railway/Nixpacks Config für Frontend-Service.
#
# Analoges Setup wie Backend — siehe apps/backend/nixpacks.toml für Hintergrund.
#
# `npm install` (statt `npm ci`) funktioniert ohne package-lock.json.
# astro-build läuft und generiert dist/ für standalone Node-Adapter.

providers = ["node"]

[variables]
NPM_CONFIG_PRODUCTION = "false"
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install --no-audit --no-fund --legacy-peer-deps",
]

[phases.build]
cmds = [
  "npm run build",
]

[start]
cmd = "HOST=0.0.0.0 node dist/server/entry.mjs"

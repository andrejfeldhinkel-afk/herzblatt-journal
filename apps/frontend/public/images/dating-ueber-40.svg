<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="170" cy="100" r="95" fill="rgba(255, 255, 255, 0.12)"/>
  <circle cx="1030" cy="400" r="125" fill="rgba(255, 255, 255, 0.1)"/>

  <!-- Main icon: Two wine glasses clinking -->
  <g transform="translate(600, 250)">
    <!-- Left wine glass -->
    <g transform="translate(-65, -30)">
      <path d="M -20,-50 L -30,20 Q -30,35 -20,40 L 20,40 Q 30,35 30,20 L 20,-50 Z" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="-18" y1="40" x2="-10" y2="60" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <!-- Wine in glass -->
      <path d="M -25,10 L -28,25 Q -28,32 -20,38 L 20,38 Q 28,32 28,25 L 22,10 Z" fill="rgba(255, 255, 255, 0.4)"/>
    </g>

    <!-- Right wine glass -->
    <g transform="translate(65, -30)">
      <path d="M -20,-50 L -30,20 Q -30,35 -20,40 L 20,40 Q 30,35 30,20 L 20,-50 Z" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="18" y1="40" x2="10" y2="60" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <!-- Wine in glass -->
      <path d="M -25,10 L -28,25 Q -28,32 -20,38 L 20,38 Q 28,32 28,25 L 22,10 Z" fill="rgba(255, 255, 255, 0.4)"/>
    </g>

    <!-- Sparkle/toast indicator -->
    <path d="M -5,-60 L 0,-75 L 5,-60 M -3,-65 L 3,-65" stroke="rgba(255, 255, 255, 0.8)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 8,-55 L 15,-65 L 20,-55" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
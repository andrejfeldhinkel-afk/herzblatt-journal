<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000"/>
      <stop offset="100%" style="stop-color:#DC143C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg13)"/>
  <circle cx="200" cy="100" r="140" fill="white" opacity="0.08"/>
  <circle cx="1000" cy="400" r="190" fill="white" opacity="0.06"/>
  <circle cx="600" cy="250" r="75" fill="white" opacity="0.1"/>
  
  <!-- Shield outline -->
  <path d="M 600 150 L 520 200 L 520 300 Q 520 350 600 380 Q 680 350 680 300 L 680 200 Z" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Shield fill with gradient pattern -->
  <path d="M 600 150 L 520 200 L 520 300 Q 520 350 600 380 Q 680 350 680 300 L 680 200 Z" fill="white" opacity="0.15"/>
  
  <!-- Diagonal stripes (danger pattern) -->
  <line x1="540" y1="200" x2="580" y2="240" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="580" y1="200" x2="620" y2="240" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="620" y1="200" x2="660" y2="240" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="540" y1="260" x2="580" y2="300" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="580" y1="260" x2="620" y2="300" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="620" y1="260" x2="660" y2="300" stroke="white" stroke-width="3" opacity="0.6"/>
  
  <!-- Central exclamation mark -->
  <circle cx="600" cy="300" r="5" fill="white" opacity="0.8"/>
  <line x1="600" y1="260" x2="600" y2="285" stroke="white" stroke-width="3" opacity="0.8"/>
  
  <!-- Decorative warning element left -->
  <circle cx="350" cy="200" r="40" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  <path d="M 350 160 L 350 240" stroke="white" stroke-width="2" opacity="0.2"/>
  <circle cx="350" cy="250" r="4" fill="white" opacity="0.2"/>
  
  <!-- Decorative warning element right -->
  <circle cx="850" cy="280" r="45" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  <path d="M 850 235 L 850 325" stroke="white" stroke-width="2" opacity="0.2"/>
  <circle cx="850" cy="335" r="5" fill="white" opacity="0.2"/>
  
  <!-- Pattern dots -->
  <circle cx="100" cy="450" r="3" fill="white" opacity="0.2"/>
  <circle cx="300" cy="50" r="2" fill="white" opacity="0.15"/>
  <circle cx="900" cy="100" r="4" fill="white" opacity="0.15"/>
  <circle cx="1100" cy="350" r="3" fill="white" opacity="0.2"/>

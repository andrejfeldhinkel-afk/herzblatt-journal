<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D8A5D8"/>
      <stop offset="100%" style="stop-color:#F0A0D8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg12)"/>
  <circle cx="220" cy="120" r="130" fill="white" opacity="0.08"/>
  <circle cx="950" cy="370" r="195" fill="white" opacity="0.06"/>
  <circle cx="600" cy="250" r="80" fill="white" opacity="0.1"/>
  
  <!-- Left person -->
  <circle cx="450" cy="150" r="25" fill="white" opacity="0.8"/>
  <rect x="430" y="180" width="40" height="80" rx="8" fill="white" opacity="0.8"/>
  <rect x="420" y="270" width="15" height="60" rx="7" fill="white" opacity="0.8"/>
  <rect x="455" y="270" width="15" height="60" rx="7" fill="white" opacity="0.8"/>
  
  <!-- Left person arm extended -->
  <line x1="430" y1="195" x2="380" y2="160" stroke="white" stroke-width="8" opacity="0.8"/>
  
  <!-- Right person -->
  <circle cx="750" cy="150" r="25" fill="white" opacity="0.8"/>
  <rect x="730" y="180" width="40" height="80" rx="8" fill="white" opacity="0.8"/>
  <rect x="720" y="270" width="15" height="60" rx="7" fill="white" opacity="0.8"/>
  <rect x="755" y="270" width="15" height="60" rx="7" fill="white" opacity="0.8"/>
  
  <!-- Right person arm extended -->
  <line x1="770" y1="195" x2="820" y2="160" stroke="white" stroke-width="8" opacity="0.8"/>
  
  <!-- Connection line with hearts -->
  <line x1="480" y1="220" x2="720" y2="220" stroke="#FF1493" stroke-width="3" stroke-dasharray="10,5"/>
  
  <!-- Hearts on connection -->
  <circle cx="550" cy="215" r="8" fill="#FF1493"/>
  <circle cx="600" cy="215" r="8" fill="#FF1493"/>
  <circle cx="650" cy="215" r="8" fill="#FF1493"/>
  
  <!-- Decorative shapes -->
  <rect x="300" y="140" width="65" height="65" rx="15" fill="white" opacity="0.1"/>
  <circle cx="850" cy="300" r="50" fill="white" opacity="0.12"/>
  
  <!-- Pattern dots -->
  <circle cx="100" cy="450" r="3" fill="white" opacity="0.2"/>
  <circle cx="300" cy="50" r="2" fill="white" opacity="0.15"/>
  <circle cx="900" cy="100" r="4" fill="white" opacity="0.15"/>
  <circle cx="1100" cy="350" r="3" fill="white" opacity="0.2"/>
</svg>

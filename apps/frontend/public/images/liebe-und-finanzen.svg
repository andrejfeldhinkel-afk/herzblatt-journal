<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="180" cy="90" r="100" fill="rgba(255, 255, 255, 0.12)"/>
  <circle cx="1020" cy="410" r="120" fill="rgba(255, 255, 255, 0.1)"/>

  <!-- Main icon: Two piggy banks with heart -->
  <g transform="translate(600, 250)">
    <!-- Left piggy bank -->
    <g transform="translate(-80, -10)">
      <ellipse cx="0" cy="0" rx="35" ry="40" fill="white"/>
      <!-- Snout -->
      <circle cx="35" cy="-5" r="12" fill="white"/>
      <!-- Ear -->
      <ellipse cx="-25" cy="-40" rx="12" ry="22" fill="white"/>
      <!-- Legs -->
      <rect x="-20" y="35" width="12" height="35" fill="white" rx="6"/>
      <rect x="8" y="35" width="12" height="35" fill="white" rx="6"/>
      <!-- Coin slot -->
      <rect x="-8" y="-30" width="16" height="4" fill="rgba(255, 255, 255, 0.6)"/>
    </g>

    <!-- Right piggy bank -->
    <g transform="translate(80, -10)">
      <ellipse cx="0" cy="0" rx="35" ry="40" fill="white"/>
      <!-- Snout -->
      <circle cx="35" cy="-5" r="12" fill="white"/>
      <!-- Ear -->
      <ellipse cx="-25" cy="-40" rx="12" ry="22" fill="white"/>
      <!-- Legs -->
      <rect x="-20" y="35" width="12" height="35" fill="white" rx="6"/>
      <rect x="8" y="35" width="12" height="35" fill="white" rx="6"/>
      <!-- Coin slot -->
      <rect x="-8" y="-30" width="16" height="4" fill="rgba(255, 255, 255, 0.6)"/>
    </g>

    <!-- Heart in center connecting them -->
    <path d="M 0,15 C -12,5 -28,5 -28,18 C -28,30 0,55 0,55 C 0,55 28,30 28,18 C 28,5 12,5 0,15 Z" fill="rgba(255, 255, 255, 0.9)"/>

    <!-- Dollar sign above -->
    <text x="0" y="-55" font-size="40" fill="rgba(255, 255, 255, 0.7)" text-anchor="middle">$</text>
  </g>
</svg>
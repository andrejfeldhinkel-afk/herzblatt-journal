<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6D5F5"/>
      <stop offset="100%" stop-color="#9B7DBD"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="80" r="90" fill="rgba(255, 255, 255, 0.12)"/>
  <circle cx="1050" cy="420" r="110" fill="rgba(255, 255, 255, 0.1)"/>

  <!-- Main icon: Person reading with floating hearts -->
  <g transform="translate(600, 250)">
    <!-- Person sitting -->
    <circle cx="-50" cy="-60" r="22" fill="white"/>
    <path d="M -50,-35 L -50,10 L -65,30 L -35,30 M -55,-20 L -80,-5" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>

    <!-- Book -->
    <g transform="translate(20, -10)">
      <rect x="-30" y="-50" width="60" height="80" fill="rgba(255, 255, 255, 0.9)" rx="3"/>
      <line x1="0" y1="-50" x2="0" y2="30" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2"/>
      <line x1="-15" y1="-35" x2="15" y2="-35" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5"/>
      <line x1="-15" y1="-20" x2="15" y2="-20" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5"/>
      <line x1="-15" y1="-5" x2="15" y2="-5" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5"/>
      <line x1="-15" y1="10" x2="15" y2="10" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5"/>
    </g>

    <!-- Floating hearts -->
    <path d="M 60,-40 C 55,-50 45,-50 45,-40 C 45,-30 60,-15 60,-15 C 60,-15 75,-30 75,-40 C 75,-50 65,-50 60,-40 Z" fill="rgba(255, 255, 255, 0.8)"/>
    <path d="M 85,20 C 80,10 70,10 70,20 C 70,30 85,45 85,45 C 85,45 100,30 100,20 C 100,10 90,10 85,20 Z" fill="rgba(255, 255, 255, 0.7)"/>
    <path d="M 30,45 C 25,35 15,35 15,45 C 15,55 30,70 30,70 C 30,70 45,55 45,45 C 45,35 35,35 30,45 Z" fill="rgba(255, 255, 255, 0.65)"/>
  </g>
</svg>
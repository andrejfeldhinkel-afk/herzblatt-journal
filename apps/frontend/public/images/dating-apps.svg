<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D4EDD"/>
      <stop offset="100%" style="stop-color:#FF006E"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg3)"/>
  <circle cx="250" cy="120" r="140" fill="white" opacity="0.08"/>
  <circle cx="950" cy="380" r="190" fill="white" opacity="0.06"/>
  <circle cx="600" cy="250" r="75" fill="white" opacity="0.1"/>
  
  <!-- Phone -->
  <rect x="480" y="160" width="240" height="380" rx="25" fill="white" stroke="#FF006E" stroke-width="4"/>
  <rect x="490" y="175" width="220" height="350" rx="20" fill="#F0F0F0"/>
  
  <!-- Screen content -->
  <circle cx="600" cy="240" r="40" fill="url(#bg3)"/>
  <rect x="520" y="290" width="160" height="30" rx="5" fill="#E0E0E0"/>
  <rect x="520" y="330" width="160" height="25" rx="5" fill="#FFE0E0"/>
  
  <!-- Heart overlay -->
  <path d="M 600 220 Q 585 210 575 220 Q 570 230 575 240 Q 585 250 600 260 Q 615 250 625 240 Q 630 230 625 220 Q 615 210 600 220 Z" fill="#FF006E"/>
  
  <!-- Like/dislike buttons -->
  <rect x="500" y="420" width="45" height="45" rx="10" fill="#E0E0E0"/>
  <rect x="555" y="420" width="45" height="45" rx="10" fill="#FF006E" opacity="0.8"/>
  <rect x="610" y="420" width="45" height="45" rx="10" fill="#E0E0E0"/>
  
  <!-- Decorative shapes -->
  <circle cx="350" cy="200" r="25" fill="white" opacity="0.15"/>
  <circle cx="800" cy="150" r="35" fill="white" opacity="0.12"/>
  
  <!-- Pattern dots -->
  <circle cx="100" cy="450" r="3" fill="white" opacity="0.2"/>
  <circle cx="300" cy="50" r="2" fill="white" opacity="0.15"/>
  <circle cx="900" cy="100" r="4" fill="white" opacity="0.15"/>
  <circle cx="1100" cy="350" r="3" fill="white" opacity="0.2"/>
</svg>

  </defs>
  <rect width="1200" height="500" fill="url(#bg17)"/>
  <circle cx="200" cy="100" r="140" fill="white" opacity="0.08"/>
  <circle cx="1000" cy="400" r="190" fill="white" opacity="0.06"/>
  <circle cx="600" cy="250" r="75" fill="white" opacity="0.1"/>
  
  <!-- Puzzle piece 1 -->
  <rect x="420" y="200" width="90" height="90" rx="8" fill="white" opacity="0.7" stroke="#4A90E2" stroke-width="2"/>
  <path d="M 465 190 Q 475 180 485 190" fill="white" stroke="#4A90E2" stroke-width="2"/>
  

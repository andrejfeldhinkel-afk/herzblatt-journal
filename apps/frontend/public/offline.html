<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e11d48">
  <title>Offline · Herzblatt Journal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
      font-family: system-ui, -apple-system, 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #fff1f2 0%, #ffe4e6 100%);
      color: #1c1917;
    }
    .icon {
      width: 120px; height: 120px; margin-bottom: 1.5rem;
      background: white; border-radius: 30px; padding: 20px;
      box-shadow: 0 10px 40px rgba(244, 63, 94, 0.15);
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2rem; margin: 0 0 0.75rem; color: #be123c;
    }
    p { max-width: 32rem; line-height: 1.6; color: #57534e; margin: 0 0 2rem; }
    a {
      display: inline-block; padding: 0.75rem 1.75rem;
      background: linear-gradient(135deg, #f43f5e, #be123c);
      color: white; text-decoration: none; font-weight: 600;
      border-radius: 999px; box-shadow: 0 4px 14px rgba(244, 63, 94, 0.35);
      transition: transform 0.15s;
    }
    a:hover { transform: translateY(-1px); }
    .hint { margin-top: 1.5rem; font-size: 0.85rem; color: #a8a29e; }
  </style>
</head>
<body>
  <img src="/icons/icon-192.png" alt="Herzblatt Journal" class="icon" onerror="this.style.display='none'">
  <h1>Du bist offline</h1>
  <p>Kein Internet — macht nichts! Du kannst bereits gelesene Artikel weiter lesen. Sobald du wieder online bist, sind alle Funktionen verfügbar.</p>
  <a href="/" onclick="location.reload(); return false;">Erneut versuchen</a>
  <p class="hint">Herzblatt Journal · Offline-Modus</p>
</body>
</html>

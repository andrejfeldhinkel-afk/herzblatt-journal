<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 48" fill="none">
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>

  <!-- Heart icon with modern design -->
  <g transform="translate(2, 4)">
    <!-- Main heart shape -->
    <path d="M20 36.7L3.4 20.6C-1.1 16.1-1.1 8.9 3.4 4.4 7.9-0.1 15.1-0.1 19.6 4.4L20 4.8 20.4 4.4C24.9-0.1 32.1-0.1 36.6 4.4 41.1 8.9 41.1 16.1 36.6 20.6L20 36.7Z" fill="url(#heartGrad)"/>
    <!-- Inner highlight -->
    <path d="M14 12C11.8 9.8 8.2 9.8 6 12 4.5 13.5 4.1 15.7 4.8 17.5" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <!-- Sparkle dots -->
    <circle cx="34" cy="8" r="1.5" fill="url(#dotGrad)" opacity="0.7"/>
    <circle cx="38" cy="14" r="1" fill="url(#dotGrad)" opacity="0.5"/>
  </g>

  <!-- Text: Herzblatt -->
  <text x="52" y="24" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#1c1917">Herzblatt</text>

  <!-- Text: Journal -->
  <text x="52" y="42" font-family="'DM Sans', system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="3" fill="#a8a29e" text-transform="uppercase">JOURNAL</text>
</svg>

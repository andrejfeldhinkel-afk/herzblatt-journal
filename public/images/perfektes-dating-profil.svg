<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="100%" stop-color="#FFB6C1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="160" cy="90" r="85" fill="rgba(255, 255, 255, 0.12)"/>
  <circle cx="1040" cy="410" r="115" fill="rgba(255, 255, 255, 0.1)"/>

  <!-- Main icon: Phone with profile photo and sparkles -->
  <g transform="translate(600, 250)">
    <!-- Phone body -->
    <rect x="-50" y="-95" width="100" height="160" fill="white" rx="14" stroke="white" stroke-width="3"/>
    <!-- Screen -->
    <rect x="-45" y="-85" width="90" height="140" fill="rgba(255, 192, 203, 0.2)" rx="10"/>

    <!-- Camera/photo area on phone -->
    <circle cx="0" cy="-50" r="32" fill="rgba(255, 255, 255, 0.6)"/>
    <!-- Person silhouette in photo -->
    <circle cx="0" cy="-55" r="8" fill="rgba(255, 200, 200, 0.8)"/>
    <path d="M -8,-42 L -8,-25 L -12,-15 L 4,-15 M -8,-35 L -18,-28" stroke="rgba(255, 200, 200, 0.8)" stroke-width="3.5" stroke-linecap="round" fill="none"/>

    <!-- Stars/sparkles around phone -->
    <!-- Large star top right -->
    <g transform="translate(70, -75)">
      <path d="M 0,-12 L 3,-3 L 12,-1 L 5,5 L 7,14 L 0,9 L -7,14 L -5,5 L -12,-1 L -3,-3 Z" fill="white"/>
    </g>

    <!-- Medium star top left -->
    <g transform="translate(-75, -60)">
      <path d="M 0,-8 L 2,-2 L 8,-1 L 3,3 L 5,9 L 0,6 L -5,9 L -3,3 L -8,-1 L -2,-2 Z" fill="rgba(255, 255, 255, 0.8)"/>
    </g>

    <!-- Small star bottom right -->
    <g transform="translate(75, 30)">
      <path d="M 0,-5 L 1.5,-1 L 5,-0.5 L 2,2 L 3,6 L 0,4 L -3,6 L -2,2 L -5,-0.5 L -1.5,-1 Z" fill="rgba(255, 255, 255, 0.7)"/>
    </g>

    <!-- Small star bottom left -->
    <g transform="translate(-70, 35)">
      <path d="M 0,-5 L 1.5,-1 L 5,-0.5 L 2,2 L 3,6 L 0,4 L -3,6 L -2,2 L -5,-0.5 L -1.5,-1 Z" fill="rgba(255, 255, 255, 0.7)"/>
    </g>

    <!-- Home indicator -->
    <rect x="-15" y="80" width="30" height="2" fill="rgba(255, 255, 255, 0.4)" rx="1"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20B2AA"/>
      <stop offset="100%" stop-color="#008B8B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="160" cy="110" r="85" fill="rgba(255, 255, 255, 0.11)"/>
  <circle cx="1040" cy="390" r="115" fill="rgba(255, 255, 255, 0.09)"/>

  <!-- Main icon: Chain links -->
  <g transform="translate(600, 250)">
    <!-- First link -->
    <ellipse cx="-90" cy="0" rx="25" ry="35" fill="none" stroke="white" stroke-width="8"/>

    <!-- Second link -->
    <ellipse cx="-30" cy="0" rx="25" ry="35" fill="none" stroke="white" stroke-width="8"/>

    <!-- Third link -->
    <ellipse cx="30" cy="0" rx="25" ry="35" fill="none" stroke="white" stroke-width="8"/>

    <!-- Fourth link -->
    <ellipse cx="90" cy="0" rx="25" ry="35" fill="none" stroke="white" stroke-width="8"/>

    <!-- Connection points -->
    <circle cx="-65" cy="0" r="5" fill="rgba(255, 255, 255, 0.9)"/>
    <circle cx="-55" cy="0" r="5" fill="rgba(255, 255, 255, 0.9)"/>
    <circle cx="-5" cy="0" r="5" fill="rgba(255, 255, 255, 0.9)"/>
    <circle cx="5" cy="0" r="5" fill="rgba(255, 255, 255, 0.9)"/>
    <circle cx="55" cy="0" r="5" fill="rgba(255, 255, 255, 0.9)"/>
    <circle cx="65" cy="0" r="5" fill="rgba(255, 255, 255, 0.9)"/>
  </g>
</svg>
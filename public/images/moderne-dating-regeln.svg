<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E90FF"/>
      <stop offset="100%" stop-color="#4B0082"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="80" r="90" fill="rgba(255, 255, 255, 0.11)"/>
  <circle cx="1050" cy="420" r="110" fill="rgba(255, 255, 255, 0.09)"/>

  <!-- Main icon: Smartphone with hearts -->
  <g transform="translate(600, 250)">
    <!-- Phone body -->
    <rect x="-45" y="-90" width="90" height="150" fill="white" rx="12" stroke="white" stroke-width="3"/>
    <!-- Screen -->
    <rect x="-40" y="-80" width="80" height="120" fill="rgba(255, 192, 203, 0.3)" rx="8"/>

    <!-- Heart on screen -->
    <path d="M 0,-40 C -8,-50 -20,-50 -20,-40 C -20,-30 0,-15 0,-15 C 0,-15 20,-30 20,-40 C 20,-50 8,-50 0,-40 Z" fill="rgba(255, 255, 255, 0.8)"/>

    <!-- Small hearts floating out -->
    <path d="M 45,-60 C 40,-70 30,-70 30,-60 C 30,-50 45,-35 45,-35 C 45,-35 60,-50 60,-60 C 60,-70 50,-70 45,-60 Z" fill="rgba(255, 255, 255, 0.7)"/>
    <path d="M 65,-20 C 60,-30 50,-30 50,-20 C 50,-10 65,5 65,5 C 65,5 80,-10 80,-20 C 80,-30 70,-30 65,-20 Z" fill="rgba(255, 255, 255, 0.65)"/>
    <path d="M 70,30 C 65,20 55,20 55,30 C 55,40 70,55 70,55 C 70,55 85,40 85,30 C 85,20 75,20 70,30 Z" fill="rgba(255, 255, 255, 0.6)"/>

    <!-- Home button -->
    <circle cx="0" cy="85" r="6" fill="rgba(255, 255, 255, 0.4)"/>
  </g>
</svg>
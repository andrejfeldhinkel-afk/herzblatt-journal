<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg18" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6D9"/>
      <stop offset="100%" style="stop-color:#D8A5D8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg18)"/>
  <circle cx="220" cy="90" r="135" fill="white" opacity="0.08"/>
  <circle cx="980" cy="410" r="200" fill="white" opacity="0.06"/>
  <circle cx="600" cy="250" r="80" fill="white" opacity="0.1"/>
  
  <!-- Compass circle -->
  <circle cx="600" cy="250" r="85" fill="none" stroke="white" stroke-width="4"/>
  <circle cx="600" cy="250" r="75" fill="white" opacity="0.1" stroke="white" stroke-width="2"/>
  
  <!-- Cardinal points -->
  <text x="600" y="175" font-size="28" fill="white" text-anchor="middle" font-weight="bold">N</text>
  <text x="725" y="260" font-size="28" fill="white" text-anchor="middle" font-weight="bold">E</text>
  <text x="600" y="340" font-size="28" fill="white" text-anchor="middle" font-weight="bold">S</text>
  <text x="475" y="260" font-size="28" fill="white" text-anchor="middle" font-weight="bold">W</text>
  
  <!-- Compass needle -->
  <polygon points="600,200 595,250 600,290 605,250" fill="#FF1493" stroke="white" stroke-width="2"/>
  <circle cx="600" cy="250" r="8" fill="white" stroke="#FF1493" stroke-width="2"/>
  
  <!-- Directional markers -->
  <circle cx="600" cy="165" r="6" fill="white" opacity="0.4"/>
  <circle cx="730" cy="250" r="6" fill="white" opacity="0.4"/>
  <circle cx="600" cy="335" r="6" fill="white" opacity="0.4"/>
  <circle cx="470" cy="250" r="6" fill="white" opacity="0.4"/>
  
  <!-- Decorative shapes -->
  <rect x="300" y="150" width="60" height="60" rx="10" fill="white" opacity="0.1"/>
  <circle cx="900" cy="320" r="50" fill="white" opacity="0.12"/>
  
  <!-- Pattern dots -->
  <circle cx="100" cy="450" r="3" fill="white" opacity="0.2"/>
  <circle cx="300" cy="50" r="2" fill="white" opacity="0.15"/>
  <circle cx="900" cy="100" r="4" fill="white" opacity="0.15"/>
  <circle cx="1100" cy="350" r="3" fill="white" opacity="0.2"/>
</svg>
